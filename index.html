<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nomi相机</title>
  <meta name="description" content="Nomi相机小程序体验入口" />
  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      display: grid;
      place-items: center;
      background: #fff;
      color: #111;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    main {
      width: min(360px, calc(100vw - 48px));
      text-align: center;
    }
    img {
      display: block;
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: contain;
    }
    .caption {
      margin: 20px 0 0;
      display: grid;
      gap: 10px;
      justify-items: center;
    }
    .rule {
      width: min(220px, 70%);
      height: 1px;
      background: #111;
      opacity: .18;
    }
    p {
      margin: 0;
      padding: 0 8px;
      font-size: 16px;
      line-height: 1.6;
      letter-spacing: .02em;
      color: #222;
    }
  </style>
</head>
<body>
  <main>
    <img src="assets/nomi-miniapp-qr.png" alt="Nomi相机小程序二维码" />
    <div class="caption">
      <div class="rule"></div>
      <p>请用微信扫一扫二维码，打开 Nomi相机小程序</p>
      <div class="rule"></div>
    </div>
  </main>
</body>
</html>
